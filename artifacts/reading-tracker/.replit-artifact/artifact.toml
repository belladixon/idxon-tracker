kind = "web"
previewPath = "/"
title = "Reading Tracker"
version = "1.0.0"
id = "artifacts/reading-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20725

[services.development]
run = "pnpm --filter @workspace/reading-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reading-tracker", "run", "build" ]
publicDir = "artifacts/reading-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20725"
BASE_PATH = "/"
